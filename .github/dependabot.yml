version: 2
updates:
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      gradle-deps:
        patterns:
          - "*"
    ignore:
      - dependency-name: "com.diffplug.spotless:spotless-plugin-gradle"
        versions: ["8.3.0"]
  - package-ecosystem: "docker"
    directory: "/bosk-mongo/src/test/resources"
    schedule:
      interval: "weekly"
    groups:
      dockerfiles:
        patterns:
          - "*"
